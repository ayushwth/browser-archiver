<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', -apple-system, sans-serif;
      background: #131316;
      color: #ececef;
      width: 340px;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .header .logo {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: #a0a0ab;
      font-weight: 700;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #ececef;
      letter-spacing: -0.01em;
    }

    .current-page {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .current-page .label {
      font-size: 10px;
      color: #5c5c66;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .current-page .url {
      font-size: 12px;
      color: #8e8e96;
      word-break: break-all;
      line-height: 1.5;
    }

    .tag-input {
      width: 100%;
      padding: 8px 12px;
      font-size: 13px;
      background: #111114;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 6px;
      color: #ececef;
      outline: none;
      margin-bottom: 12px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .tag-input:focus {
      border-color: rgba(255,255,255,0.22);
    }

    .tag-input::placeholder { color: #3e3e47; }

    .btn {
      width: 100%;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.01em;
    }

    .btn-primary {
      background: rgba(255,255,255,0.08);
      color: #ececef;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-primary:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.15);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
    }

    .message.success {
      background: rgba(74, 222, 128, 0.08);
      color: #4ade80;
      border: 1px solid rgba(74, 222, 128, 0.15);
    }

    .message.error {
      background: rgba(248, 113, 113, 0.08);
      color: #f87171;
      border: 1px solid rgba(248, 113, 113, 0.15);
    }

    .message.info {
      background: rgba(148, 163, 184, 0.08);
      color: #94a3b8;
      border: 1px solid rgba(148, 163, 184, 0.15);
    }

    .settings {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #8e8e96;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: rgba(255,255,255,0.06);
      border-radius: 20px;
      transition: 0.25s;
      border: 1px solid rgba(255,255,255,0.07);
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 2px;
      bottom: 2px;
      background: #5c5c66;
      border-radius: 50%;
      transition: 0.25s;
    }

    .toggle input:checked + .toggle-slider {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.15);
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(16px);
      background: #ececef;
    }

    .footer {
      margin-top: 12px;
      text-align: center;
    }

    .footer a {
      font-size: 11px;
      color: #8e8e96;
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer a:hover { color: #ececef; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">A</div>
    <h1>Archive</h1>
  </div>

  <div class="current-page">
    <div class="label">Current Page</div>
    <div class="url" id="current-url">Loading...</div>
  </div>

  <input
    type="text"
    class="tag-input"
    id="tags-input"
    placeholder="Tags (comma-separated, optional)"
  />

  <button class="btn btn-primary" id="archive-btn">Archive This Page</button>

  <div id="message" style="display: none;"></div>

  <div class="settings">
    <div class="toggle-row">
      <span>Auto-capture pages</span>
      <label class="toggle">
        <input type="checkbox" id="auto-capture-toggle" />
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div class="footer">
    <a href="http://localhost:5173" target="_blank">Open Dashboard</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
